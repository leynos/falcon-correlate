name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      MERMAN_CLI_VERSION: '0.7.0'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install yaml schema validator
        run: bun install -g pajv

      - name: Install CLI tools
        run: |
          for tool in mbake ty ruff; do uv tool install ${tool}; done
          uv tool install nixie-cli==1.1.0
          npm install -g markdownlint-cli2

      - name: Validate Makefile
        run: mbake validate Makefile

      - name: Install code
        run: make build

      - name: Check formatting
        run: make check-fmt

      - name: Run ruff
        run: make lint

      - name: Run typechecker
        run: make typecheck

      - name: Run Markdown lint and spelling checks
        run: make markdownlint

      - name: Set up Rust for Merman
        run: rustup toolchain install 1.95.0

      - name: Cache Merman
        id: merman-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/merman-cli
          key: merman-${{ runner.os }}-${{ runner.arch }}-${{ env.MERMAN_CLI_VERSION }}

      - name: Install Merman
        if: steps.merman-cache.outputs.cache-hit != 'true'
        run: cargo +1.95.0 install merman-cli --version "=${MERMAN_CLI_VERSION}" --locked

      - name: Validate Mermaid diagrams
        run: make nixie

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install code
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests
        if: matrix.python-version != '3.13' || github.event_name != 'pull_request'
        run: uv run pytest -v -n auto --ignore=tests/workflows

      # Coverage runs on pull requests only, and on a single matrix leg
      # (3.13). Pushes to main upload their own coverage (and advance the
      # ratchet baseline) via coverage-main.yml, so generating it here as
      # well would duplicate the work and the CodeScene upload for the
      # same commit.
      - name: Generate coverage
        if: matrix.python-version == '3.13' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          output-path: coverage.xml
          format: cobertura
          # falcon-correlate's own `make test` target already runs
          # `pytest -n auto`, so the suite is xdist-clean; keep the
          # shared action's default worker count rather than forcing a
          # serial run.
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: matrix.python-version == '3.13' && github.event_name == 'pull_request' && env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          format: cobertura
          mode: check
          project-url: https://api.codescene.io/v2/projects/75281
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
