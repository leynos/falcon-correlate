name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install yaml schema validator
        run: bun install -g pajv

      - name: Install CLI tools
        run: |
          for tool in mbake ty ruff; do uv tool install ${tool}; done
          npm install -g markdownlint-cli2

      - name: Validate Makefile
        run: mbake validate Makefile

      - name: Install code
        run: make build

      - name: Check formatting
        run: make check-fmt

      - name: Run ruff
        run: make lint

      - name: Run typechecker
        run: make typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install code
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests
        if: matrix.python-version != '3.13' || github.event_name != 'pull_request'
        run: uv run pytest -v -n auto --ignore=tests/workflows

      # Coverage runs on pull requests only, and on a single matrix leg
      # (3.13). Pushes to main upload their own coverage (and advance the
      # ratchet baseline) via coverage-main.yml, so generating it here as
      # well would duplicate the work and the CodeScene upload for the
      # same commit.
      - name: Generate coverage
        if: matrix.python-version == '3.13' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: coverage.xml
          format: cobertura
          # falcon-correlate's own `make test` target already runs
          # `pytest -n auto`, so the suite is xdist-clean; keep the
          # shared action's default worker count rather than forcing a
          # serial run.
          with-ratchet: 'true'
      # The `mode: check` step is deliberately not wired in yet: CodeScene
      # project 75281 has no coverage-gates configuration, so
      # `cs-coverage check` fails every run with "HTTP call succeeded,
      # but the received project-config isn't valid. Lacks the gates
      # configuration." — a CodeScene-side per-project setting, not a CI
      # defect (ddlint, chutoro and cmd-mox's projects hit the
      # byte-identical error). Add the check step in a fast-follow PR
      # once coverage-main.yml has uploaded to main at least once and the
      # gate is confirmed to resolve, or once CodeScene confirms the
      # project's coverage gate is enabled.
